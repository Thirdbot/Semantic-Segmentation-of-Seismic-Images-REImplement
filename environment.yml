name: rockml
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - setuptools
  - wheel

  # Keep compiled scientific packages on conda-forge so the solver chooses the
  # right builds for Linux, macOS, and Windows.
  # rockml 0.20.0 saves optimizer variables with np.save on a list of arrays.
  # NumPy 1.24+ raises on that inhomogeneous list, while TensorFlow 2.15
  # supports NumPy >=1.23.5,<2.0.
  - numpy=1.23.5
  - pandas>=2.1,<3
  - scipy>=1.11,<2
  - scikit-image>=0.22,<1
  - h5py>=3.10,<4
  - matplotlib>=3.8,<4
  - pillow>=10,<13
  - pyyaml>=6,<7
  - graphviz

  - pip:
      # TensorFlow 2.15 is the newest stable line that works well with
      # Python 3.10 and NumPy 1.x across common desktop/server OSes.
      - tensorflow>=2.15,<2.16
      - rockml==0.20.0
      - lasio>=0.32,<1
      - pydot>=2,<5
      - murmurhash>=1,<2
